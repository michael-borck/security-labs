# __LAB_TITLE__ — the environment.
#
# A container is a host; a network is a segment. This starter has an attacker box
# and one target on a single network. Grow it: add hosts, add a second network for
# segmentation, give services static IPs the guide can reference.
services:
  attacker:
    # The workstation the student lands in — built from base.Dockerfile so it has
    # the welcome banner, `labhelp`/`netmap`, and a themed prompt out of the box.
    # `pull` (from GHCR, once CI has published it) is tried first; a fresh lab has
    # nothing to pull, so it builds locally the first time. Add tools in base.Dockerfile.
    build:
      context: .
      dockerfile: base.Dockerfile
    image: ghcr.io/__OWNER__/__LAB_SLUG__-base:latest
    container_name: __LAB_SLUG__-attacker
    hostname: attacker
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
    networks:
      labnet:
        ipv4_address: 172.30.0.10

  target:
    image: nginx:alpine  # multi-arch public example target — replace with your scenario
    container_name: __LAB_SLUG__-target
    hostname: target
    networks:
      labnet:
        ipv4_address: 172.30.0.20

networks:
  labnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
