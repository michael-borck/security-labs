name: Build and publish lab image

# Publishes the custom toolbox image (base.Dockerfile) to GHCR for BOTH amd64 and
# arm64, so learners on Apple Silicon and Intel/Windows all pull a native image.
# The starter compose uses the shared ethical-base instead, so this only matters
# once you switch to your own base image.
#
# After the first run, set the package to Public in the GitHub UI so anyone can pull.

on:
  push:
    branches: [main]
    paths:
      - 'base.Dockerfile'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: base.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/__LAB_SLUG__-base:latest
