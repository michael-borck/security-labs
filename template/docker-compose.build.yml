# Build overlay — usually not needed.
#
# docker-compose.yml already builds the 'attacker' workstation from base.Dockerfile,
# so `make run` / `./start.sh` build it locally on a fresh lab and pull the published
# image afterwards. This overlay only matters if you REMOVE the `build:` block from
# the main compose (e.g. to always pull) and later want to force a local build:
#
#   docker compose -f docker-compose.yml -f docker-compose.build.yml build
#
# On an exFAT/external drive, if a build fails on '._' files:
#   DOCKER_BUILDKIT=0 docker compose -f docker-compose.yml -f docker-compose.build.yml build
services:
